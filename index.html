<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Warbirds of Prey — WWII Campaign Stats</title>
<style>
body{margin:0;background:#0d151b;color:#edf3f6;font-family:Segoe UI,Arial,sans-serif}
header,main{padding:24px 5vw}header{background:#0b1217;border-bottom:1px solid #304552}
h1{margin:0}.muted{color:#9aadb8}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:20px 0}
.card,.panel{background:#17242d;border:1px solid #304552;border-radius:12px}.card{padding:18px}.label{font-size:12px;color:#9aadb8;text-transform:uppercase}.value{font-size:30px;font-weight:700;margin-top:7px}
.panel{overflow:hidden}.toolbar{padding:14px;background:#21333f;display:flex;justify-content:space-between;gap:10px}
input{padding:10px;width:340px;max-width:55%;background:#0e181e;color:white;border:1px solid #496170;border-radius:7px}
.tablewrap{overflow:auto;max-height:72vh}table{width:100%;border-collapse:collapse;white-space:nowrap}
th,td{padding:10px 12px;border-bottom:1px solid #2c404b;text-align:right}th{position:sticky;top:0;background:#213743}
th:nth-child(2),td:nth-child(2),th:nth-child(3),td:nth-child(3){text-align:left}.pilot{font-weight:700;color:#ffd77a}
</style></head><body>
<header><h1>Warbirds of Prey</h1><div class="muted">WWII Persistent Campaign Statistics</div></header>
<main><div id="status" class="muted">Loading…</div><div class="cards" id="cards"></div>
<div class="panel"><div class="toolbar"><strong>Pilot Leaderboard</strong><input id="search" placeholder="Search pilot or rank"></div>
<div class="tablewrap"><table id="table"></table></div></div></main>
<script>
let data={};
const esc=x=>String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function render(){const c=data.campaign||{},p=data.pilots||[];
document.getElementById('cards').innerHTML=[['RAF Points',c.RedCampaignPoints||0],['LW Points',c.BlueCampaignPoints||0],['Pilots',p.length],['Destroyed Targets',(data.destroyedTargets||[]).length],['Damaged Targets',(data.targetDamage||[]).length]].map(x=>`<div class="card"><div class="label">${x[0]}</div><div class="value">${x[1]}</div></div>`).join('');
document.getElementById('table').innerHTML='<thead><tr><th>#</th><th>Pilot</th><th>Rank</th><th>Score</th><th>Sorties</th><th>Air</th><th>Ground</th><th>Ships</th><th>Deaths</th><th>K/D</th><th>Bomb kg</th><th>Hours</th></tr></thead><tbody>'+p.map(x=>`<tr><td>${x.position}</td><td class="pilot">${esc(x.pilot)}</td><td>${esc(x.rank)}</td><td>${x.score}</td><td>${x.sorties}</td><td>${x.airKills}</td><td>${x.groundKills}</td><td>${x.shipKills}</td><td>${x.deaths}</td><td>${x.killDeathRatio}</td><td>${x.bombKg}</td><td>${x.flightHours}</td></tr>`).join('')+'</tbody>';
document.getElementById('status').textContent='Updated '+new Date(data.generatedUtc).toLocaleString();}
async function load(){try{const r=await fetch('data/portal.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);data=await r.json();render()}catch(e){document.getElementById('status').textContent='Waiting for published data…'}}
document.getElementById('search').oninput=e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('tbody tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q)?'':'none')};
load();setInterval(load,30000);
</script></body></html>
